name: Code Quality and Testing

on:
  pull_request:
  push:
    branches: [main, master]

# Set minimum required permissions
permissions:
  contents: read  # Only needs read access to repository content

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --with mcp
          # Install required dependencies directly as well, so they're available to pre-commit hooks
          pip install pre-commit mypy pytest pydantic
          pip install -e .
      - name: Run pre-commit
        run: pre-commit run --all-files

  test-matrix:
    needs: pre-commit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --with mcp
      - name: Run tests
        run: poetry run pytest
      - name: Run tests with coverage
        run: poetry run pytest --cov=prompt_decorators tests/

  type-check:
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry mypy
          poetry install --with mcp
      - name: Run mypy
        run: poetry run mypy prompt_decorators

  docstring-check:
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --with mcp
      - name: Check docstrings
        run: python scripts/standardize_docstrings.py prompt_decorators --check

  vendor-sync-check:
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check plugin vendor is in sync with prompt_decorators/
        run: |
          if diff -rq \
              --exclude='__pycache__' \
              --exclude='*.pyc' \
              prompt_decorators \
              claude-code-plugin/vendor/prompt_decorators; then
            echo "Vendor tree is in sync."
          else
            echo ""
            echo "::error::claude-code-plugin/vendor/prompt_decorators has drifted from prompt_decorators/."
            echo "Run the sync from claude-code-plugin/VENDORING.md:"
            echo "  rm -rf claude-code-plugin/vendor/prompt_decorators"
            echo "  cp -r prompt_decorators claude-code-plugin/vendor/prompt_decorators"
            echo "  find claude-code-plugin/vendor -type d -name __pycache__ -exec rm -rf {} +"
            echo "  find claude-code-plugin/vendor -type f -name '*.pyc' -delete"
            exit 1
          fi
